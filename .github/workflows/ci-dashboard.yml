name: CI - Management Panel (TypeScript)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/management-panel/**'
      - '.github/workflows/ci-dashboard.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/management-panel/**'

env:
  SERVICE_PATH: services/management-panel
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/management-panel

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '${{ env.SERVICE_PATH }}/package-lock.json'
      
      - name: Install dependencies
        run: cd ${{ env.SERVICE_PATH }} && npm ci
      
      - name: Run ESLint
        run: cd ${{ env.SERVICE_PATH }} && npm run lint
      
      - name: Type check
        run: cd ${{ env.SERVICE_PATH }} && npm run type-check

  test:
    runs-on: ubuntu-latest
    name: Unit Tests & Coverage
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '${{ env.SERVICE_PATH }}/package-lock.json'
      
      - name: Install dependencies
        run: cd ${{ env.SERVICE_PATH }} && npm ci
      
      - name: Run tests
        run: cd ${{ env.SERVICE_PATH }} && npm run test -- --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ env.SERVICE_PATH }}/coverage/coverage-final.json
          flags: dashboard
          name: dashboard-coverage

  build:
    runs-on: ubuntu-latest
    name: Build & Bundle
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '${{ env.SERVICE_PATH }}/package-lock.json'
      
      - name: Install dependencies
        run: cd ${{ env.SERVICE_PATH }} && npm ci
      
      - name: Build project
        run: cd ${{ env.SERVICE_PATH }} && npm run build

  docker:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
